# /etc/nginx/sites-available/deamaclub.com
# After editing:
#   sudo ln -s /etc/nginx/sites-available/deamaclub.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then provision SSL with Certbot:
#   sudo certbot --nginx -d deamaclub.com -d www.deamaclub.com

# ---- Rate limit zones (shared across requests) ----
limit_req_zone $binary_remote_addr zone=deamaclub_api:10m  rate=20r/s;
limit_req_zone $binary_remote_addr zone=deamaclub_login:10m rate=5r/m;

# ---- Upstream Next.js (PM2 cluster on :3000) ----
upstream deamaclub_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ---- HTTP -> HTTPS redirect ----
server {
    listen 80;
    listen [::]:80;
    server_name deamaclub.com www.deamaclub.com;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name deamaclub.com www.deamaclub.com;

    # Certbot will inject the correct paths after first run.
    ssl_certificate     /etc/letsencrypt/live/deamaclub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deamaclub.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:DeamaSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Canonicalize www -> apex (good for SEO + ad RPM analytics)
    if ($host = www.deamaclub.com) {
        return 301 https://deamaclub.com$request_uri;
    }

    # ---- Security headers (others set in next.config.mjs) ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Gzip + Brotli (install ngx_brotli to enable brotli) ----
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json
               application/xml+rss text/xml image/svg+xml application/x-font-ttf
               font/opentype application/vnd.ms-fontobject;
    gzip_min_length 1024;

    client_max_body_size 50M;

    # ---- Static assets: long cache ----
    location /_next/static/ {
        proxy_pass http://deamaclub_upstream;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location /uploads/ {
        # Local fallback upload dir; long cache, immutable filenames recommended.
        alias /var/www/deamaclub/public/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|avif|svg|woff2?|ttf)$ {
        proxy_pass http://deamaclub_upstream;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ---- Auth endpoints: tighter rate limit ----
    location /api/auth/ {
        limit_req zone=deamaclub_login burst=10 nodelay;
        proxy_pass http://deamaclub_upstream;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ---- API ----
    location /api/ {
        limit_req zone=deamaclub_api burst=40 nodelay;
        proxy_pass http://deamaclub_upstream;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ---- App ----
    location / {
        proxy_pass http://deamaclub_upstream;
        include /etc/nginx/proxy_params;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # Hide Nginx version
    server_tokens off;
}
